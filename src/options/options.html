<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Precog Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Precog Settings</h1>

    <div class="setting">
      <label for="emailDataScope">Email data scope</label>
      <select id="emailDataScope">
        <option value="full">Full body</option>
        <option value="snippet">Snippet (~200 characters)</option>
      </select>
      <p class="hint">Controls how much of the email body is included in the prompt.</p>
    </div>

    <h2>Prompt building blocks</h2>
    <p class="hint" style="margin-bottom: 16px;">Each block's template can be customized below. These are combined when you generate a prompt. Placeholder: {today}.</p>

    <div id="block-editors"></div>

    <div class="actions">
      <button id="save">Save</button>
      <span id="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
